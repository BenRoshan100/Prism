chunking:
  chunk_size: 500
  chunk_overlap: 50

retrieval:
  collection_name: "finrag"
  dense_weight: 0.7
  sparse_weight: 0.3
  retrieve_k: 20
  rerank_k: 5

memory:
  max_token_limit: 2000

llm:
  # Groq inference — fast open-weight models via GROQ_API_KEY
  # Embeddings still use Euron API (EURON_API_KEY) — Groq has no embeddings endpoint
  model: "llama-3.3-70b-versatile"
  max_tokens: 1000
  temperature: 0.1

eval:
  ground_truth_path: "data/ground_truth/eval_pairs.json"
  precision_k: 5
