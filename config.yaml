chunking:
  chunk_size: 500
  chunk_overlap: 50
  semantic_enabled: false   # true = SemanticChunker (topic boundaries); false = fixed 500-char splits

retrieval:
  collection_name: "prism"
  dense_weight: 0.7
  sparse_weight: 0.3
  retrieve_k: 10
  rerank_k: 5
  hyde_enabled: false
  multi_query_enabled: false

memory:
  max_token_limit: 2000

llm:
  # Groq inference — fast open-weight models via GROQ_API_KEY
  # Embeddings still use Euron API (EURON_API_KEY) — Groq has no embeddings endpoint
  model: "llama-3.3-70b-versatile"
  max_tokens: 1000
  temperature: 0.1

eval:
  ground_truth_path: "data/ground_truth/eval_pairs.json"
  precision_k: 5

contextual_retrieval:
  enabled: true
  model: "llama-3.1-8b-instant"
  max_concurrent: 3
